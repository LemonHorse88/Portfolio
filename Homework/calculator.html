<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h1 class="h4 text-center mb-4">Calculator</h1>

        <div id="input" class="mb-3">
            <input type="text" id="num" class="form-control form-control-lg text-end" placeholder="Enter expression">
        </div>

        <div id="buttons" class="d-grid gap-2" style="grid-template-columns: repeat(4, 1fr);">
            <button class="btn btn-outline-secondary" onclick="addDisplay('1')">1</button>
            <button class="btn btn-outline-secondary" onclick="addDisplay('2')">2</button>
            <button class="btn btn-outline-secondary" onclick="addDisplay('3')">3</button>
            <button class="btn btn-outline-secondary" onclick="addDisplay('4')">4</button>
            <button class="btn btn-outline-secondary" onclick="addDisplay('5')">5</button>
            <button class="btn btn-outline-secondary" onclick="addDisplay('6')">6</button>
            <button class="btn btn-outline-secondary" onclick="addDisplay('7')">7</button>
            <button class="btn btn-outline-secondary" onclick="addDisplay('8')">8</button>
            <button class="btn btn-outline-secondary" onclick="addDisplay('9')">9</button>
            <button class="btn btn-outline-secondary" onclick="addDisplay('0')">0</button>
            <button class="btn btn-warning" onclick="addDisplay('+')">+</button>
            <button class="btn btn-warning" onclick="addDisplay('-')">-</button>
            <button class="btn btn-warning" onclick="addDisplay('*')">*</button>
            <button class="btn btn-warning" onclick="addDisplay('/')">/</button>
            <button class="btn btn-success" onclick="calculate()">=</button>
            <button class="btn btn-danger" onclick="clearDisplay()">C</button>
        </div>

    </div>
    <script>
        function addDisplay(value) {
            document.getElementById('num').value += value;
        }

        function calculate() {
            const expression = document.getElementById('num').value;
            try {
                const result = eval(expression);
                document.getElementById('num').value = result;
            } catch (error) {
                alert('Invalid expression');
            }
        }

        function clearDisplay() {
            document.getElementById('num').value = '';
        }

    </script>
</body>

</html>
