<html>
<head>

</head>
<body>

<form action="https://www.google.com/" method="get" align="center">
<table border="3" cellpadding="5" cellspacing="0">
<th colspan="2" align="center"><mark>Registration Form<mark></th>
  <tr border=2>
    <td><label for="username" >Username</label></td>
    <td><input type="text" name="username" id="username" autofocus></td>
  </tr>
  <tr>
    <td><label>Password</label></td>
    <td><input type="password"></td>
  </tr>
  <tr>
    <td><label>Email</label></td>
    <td><input type="email"></td>
  </tr>
  <tr>
    <td><label for="Address" id="Address">Address</label></td>
    <td><textarea name="Address" id="Address"></textarea></td>
  </tr>
  <tr>
    <td><label>Gender</label></td>
    <td>
      <input type="radio" name="Gender" value="Male"> Male
      <input type="radio" name="Gender" value="Female"> Female
    </td>
  </tr>
  <tr>
    <td><label name="course">Courses</label></td>
    <td>
      <input type="checkbox" name="course" value="DBMS"> DBMS
      <input type="checkbox" name="course" value="OS"> OS
      <input type="checkbox" name="course" value="Full Stack"> FULL STACK
    </td>
  </tr>
  <tr>
    <td><label>Branch</label></td>
    <td>
      <select>
        <option>CSE</option>
        <option>ECE</option>
      </select>
    </td>
  </tr>
  <tr>
    <td><label>DOB</label></td>
    <td><input type="date"></td>
  </tr>
  <tr>
    <td><label>Date&Time</label></td>
    <td><input type="datetime-local"></td>
  </tr>

  <tr>
    <td><label>Photo Upload</label></td>
    <td><input type="file"></td>
  </tr>
  <tr>
<tr>
    <td><label>Search</label></td>
    <td><input type="search" placeholder="search"></td>
  </tr>
  <tr>

    <td><label>Skills</label></td>
    <td><label>html</label><input type="range"><br>
        <label>css</label><input type="range"><br>
        <label>js</label><input type="range"><br>
        <label>react</label><input type="range"></td>
  </tr>
  <tr>
   <td align="center"><button type="reset">Reset</button></td>
  <td  align="center"><button type="submit">submit</button></td>
</tr>
</table>
<form>
