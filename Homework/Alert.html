<!DOCTYPE html> 
<html lang="en"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Square Calculator</title> 
</head> 
<body> 
    <form> 
        <label for="name">Enter a value: </label> 
        <input type="number" id="name" /> 
        <br /><br /> 
        
        <button type="button" onclick="buttonClicked()">Click Me!!</button> <br /> <br />
	<div id="op"></div> 
    </form> 

    <script> 
        function buttonClicked() {
    		const val = document.getElementById('name').value;
    		let tableContent = `<table border="1"><tr><th>SNO</th></tr>`;
		
		let sum = sumOfNumbers(val);
		document.getElementById('op').innerText = sum;
    	}

	function sumOfNumbers(val) {
    		let n = parseInt(val);
    		if (n <= 0) {
        		return 0;
    		}

    		return n + sumOfNumbers(n - 1);
	}

    </script> 
</body> 
</html>
