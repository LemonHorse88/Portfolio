<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <label for="name">Enter a value: </label>
    <input type="number" id="name" />
    <br /><br />
    <button type="button" onclick="buttonClicked()">Click Me!!</button> <br /> <br />
    <div id="op"></div>

    <script>
        let randomNum = Math.floor(Math.random() * 10) + 1;
        let prizeMoney = 1000;

        function resetRound() {
            randomNum = Math.floor(Math.random() * 10) + 1;
            prizeMoney = 1000;
        }

        function buttonClicked() {
            const val = Number(document.getElementById('name').value);
            const output = document.getElementById('op');
            const difference = Math.abs(randomNum - val);

            if (!Number.isInteger(val) || val < 1 || val > 10) {
                output.innerText = 'Please enter a whole number between 1 and 10.';
                return;
            }

            if (val === randomNum) {
                output.innerText = `Congratulations! You guessed the number and won $${prizeMoney}! New round started.`;
                resetRound();
                return;
            }

            prizeMoney -= 100;

            if (prizeMoney <= 0) {
                output.innerText = `No prize money left. The correct number was ${randomNum}. New round started.`;
                resetRound();
            } else {
                if (difference <= 1) {
                    output.innerText = `Wrong guess, but too close! Remaining prize money: $${prizeMoney}`;
                } else {
                    output.innerText = `Wrong guess, too far! Remaining prize money: $${prizeMoney}`;
                }
            }
        }
    </script>
</body>

</html>
