<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Testing ElementByClassName</title>
</head>
<body>
    <p class="highlight">Computer Science</p>
    <p class="highlight">Information Technology</p>
    <p class="highlight">Electronics and Communication </p>

    <button onclick="hightlightElements()">Highlight</button>
    <p id="result"></p>
    <script>
        function highlightElements() {
            var elements = document.getElementsByClassName("highlight");
            for (var i = 0; i < elements.length; i++) {
                elements[i].style.backgroundColor = "yellow";
                elements[i].style.fontWeight = "bold";
            }
        }
    </script>
</body>
</html>
