<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
            background-color: aqua;
        }
        #displayArea{
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
        .myTitle{
            color: blue;
            font-size: 24px;
            font-weight: bold;
        }
        .item{
            margin-bottom: 10px;
        }
    </style>
    <title>Document</title>
</head>
<body>
    <h1 class="myTitle">Welcome to JavaScript</h1>
    <p class="item">This is a simple JavaScript example.</p>
    <p class="item">You can manipulate the DOM using JavaScript.</p>
    <img id="myImage" src="Akhiloo.jpeg" size="25px">
    <br>
    <button id="changeBtn" >Change Title & Style</button>
    <button id="addBtn">Add New Item   </button>
    <button id="removeBtn">Remove Image</button>
    <script>
        document.getElementById("changeBtn").addEventListener("click", function() {
            var title = document.querySelector(".myTitle");
            title.textContent = "JavaScript DOM Manipulation";
            title.style.color = "red";
            title.style.fontSize = "28px";
        });

        document.getElementById("addBtn").addEventListener("click", function() {
            var newItem = document.createElement("p");
            newItem.textContent = "This is a new item added to the DOM.";
            newItem.classList.add("item");
            document.body.appendChild(newItem);
        });

        document.getElementById("removeBtn").addEventListener("click", function() {
            var image = document.getElementById("myImage");
            if (image) {
                image.remove();
            }
            else
            {
                alert("Image already removed!");
            }
            document.write("Nooo Akhil is my friend");
        });
    </script>
</body>
</html>
