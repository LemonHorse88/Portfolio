<!DOCTYPE html>
<html lang="en">
<head>
    <title>Advanced DOM Manipulation</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            padding: 20px;
            background-color: #f0f0f0;
        }
        #displayArea {
            margin-top: 20px;
            padding: 20px;
            border: 2px solid #ccc;
            background-color: #fff;
            border-radius: 5px;
            font-size: 24px;
            text-align: center;
            transition: all 0.3s ease;
        }
        label {
            font-size: 18px;
            margin-right: 10px;
        }
        input[type="text"], select {
            padding: 5px;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <label for="textInput">Enter text:</label>
    <input type="text" id="textInput" placeholder="Type Something"> <br> <br>

    <label for="colorPicker">Choose text color:</label>
    <input type="color" id="colorPicker" value="#000000"> <br> <br>

    <label for="fontSize">Font size:</label>
    <select id="fontSize">
        <option value="16px">Small</option>
        <option value="24px" selected>Medium</option> // Default selected option
        <option value="32px">Large</option>
        <option value="48px">Extra Large</option>
    </select> <br> <br>
    <script>
        const textInput = document.getElementById("textInput");
        const colorPicker = document.getElementById("colorPicker");
        const fontSize = document.getElementById("fontSize");
        const displayArea = document.getElementById("displayArea");

        // Update display area when text input changes
        textInput.addEventListener("input", function() {
            displayArea.textContent = textInput.value;
        });

        // Update text color when color picker changes
        colorPicker.addEventListener("input", function() {
            displayArea.style.color = colorPicker.value;
        });

        // Update font size when selection changes
        fontSizeSelect.addEventListener("change", function() {
            displayArea.style.fontSize = fontSizeSelect.value;
        });

        
    </script>
</body>
</html>
