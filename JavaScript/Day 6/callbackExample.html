<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CallBack example</title>
</head>
<body>
    <div id="demo"></div>
    <script>
        let output=document.getElementById('demo');
        function wishMe(name,sample){
            output.innerHTML+='<br> Hello '+name;
            sample();
        }
        function testCallBack(){
            output.innerHTML+='<br> This is a callback function';
        }
        wishMe('Sathvik',testCallBack);
    </script>
</body>
</html>
