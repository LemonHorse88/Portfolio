<!DOCTYPE html>
<html lang="en">
<head>
   
</head>
<body>
    <p id="output"></p>
    <script>
        var player= {name:"John", age:30, scores:[90,85,92]};
        const students=[
            {name : "Alice", scores:[90,85,92]},
            {name : "Bob", scores:[75,80,85]},
            {name : "Charlie", scores:[90,95,85]},
            {name : "Jack", scores:[100,100,100]},
        ]
        const highPerformers=students.filter(student=>{
            const averageScore=student.scores.reduce((a,b)=>a+b,0)/student.scores.length;
            return averageScore>=90;
        });
        console.log(highPerformers);
        document.getElementById("output").innerHTML="High Performers: " + highPerformers.map(student=>student.name).join(", ");
    </script>
</body>
</html>
