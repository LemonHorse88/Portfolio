<!DOCTYPE html>
<html lang="en">
<head>
</head>
<body>
    <form>
        <label for="Name">Name:  </label>
        <input type="text" id="name" name="Name" placeholder="Enter your name"> <br>
        <label for="DOB">Date of Birth: </label>
        <input type="date" id="dob" name="DOB" placeholder="Enter your date of birth"> <br>
        <label for="Branch">Branch: </label>
        <input type="text" id="Branch" name="Branch" placeholder="Enter your branch"> <br>
        <h3>Skills:</h3>
        <input type="checkbox" id="Skills" name="Skills" value="JavaScript"> JavaScript
        <input type="checkbox" id="Skills" name="Skills" value="Python"> Python
        <input type="checkbox" id="Skills" name="Skills" value="Java"> Java
        <input type="checkbox" id="Skills" name="Skills" value="C++"> C++<br>
        <button type="button" onclick="addForm()">Add</button>
    </form>
    <table>
        <tr>
            <th>Name</th>
            <th>Date of Birth</th>
            <th>Branch</th>
            <th>Skills</th>
        </tr>
        <tr>
            <td id="nameOutput"></td>
            <td id="dobOutput"></td>
            <td id="branchOutput"></td>
            <td id="skillsOutput"></td>
        </tr>

    </table>
    <script>
        function addForm(){
            const name=document.getElementById("name").value;
            const dob=document.getElementById("dob").value;
            const branch=document.getElementById("Branch").value;
            const skills=[];
            document.querySelectorAll('input[name="Skills"]:checked').forEach((checkbox)=>{
                skills.push(checkbox.value);
            });
            document.getElementById("nameOutput").textContent = name;
            document.getElementById("dobOutput").textContent = dob;
            document.getElementById("branchOutput").textContent = branch;
            document.getElementById("skillsOutput").textContent = skills.join(", ");

        }
    </script>
</body>
</html>
